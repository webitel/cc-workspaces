name: Make Release (Auto-merge)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version, next_version - major.minor only (e.g., "26.4, 26.6")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: [ arc-frontend-runner-set ]
    steps:
      - name: Create GitHub App token
        uses: webitel/reusable-workflows/actions/create-github-app-token@create-github-app-token-v1
        id: app-token
        with:
          client-id: ${{ vars.DELIVERY_BOT_CLIENT_ID }}
          private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Get previous tag
        id: prev-tag
        uses: WyriHaximus/github-action-get-previous-tag@v1

      - name: Configure Git
        run: |
          git config user.name '${{ steps.app-token.outputs.user-name }}'
          git config user.email '${{ steps.app-token.outputs.user-email }}'

      - name: Set version variables
        id: version
        run: |
          INPUT="${{ inputs.version }}"
          VERSION=$(echo $INPUT | cut -d',' -f1 | tr -d ' ') # splits versions from input by separator
          NEXT_VERSION=$(echo $INPUT | cut -d',' -f2 | tr -d ' ') # splits versions from input by separator
          
          {
            echo "version=$VERSION"
            echo "full_version=${VERSION}.0"
            echo "next_full_version=${NEXT_VERSION}.0"
            echo "version_tag=v$VERSION"
            echo "version_git_tag=v${VERSION}-tagged"
          } >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          git checkout -b "${{ steps.version.outputs.version_tag }}"
          git push -u origin ${{ steps.version.outputs.version_tag }}

      - name: Bump version in main to next version
        env:
          TRIGGERED_BY: ${{ github.actor }}
          TRIGGERED_BY_ID: ${{ github.actor_id }}

        run: |
          git checkout ${{ github.event.repository.default_branch }}
          npm version "${{ steps.version.outputs.next_full_version }}" --no-git-tag-version --allow-same-version

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          CO_AUTHOR_EMAIL="${TRIGGERED_BY_ID}+${TRIGGERED_BY}@users.noreply.github.com"
          git commit -m "chore: bump version to ${{ steps.version.outputs.next_full_version }}" \
                     -m "Co-authored-by: ${TRIGGERED_BY} <${CO_AUTHOR_EMAIL}>"

          git push origin ${{ github.event.repository.default_branch }}

      - name: Create and push tag
        run: |
          git checkout ${{ steps.version.outputs.version_tag }}
          git tag "${{ steps.version.outputs.version_git_tag }}"
          git push origin "${{ steps.version.outputs.version_git_tag }}"

      - name: Generate release changelog
        id: changelog
        uses: requarks/changelog-action@v1
        continue-on-error: true
        with:
          writeToFile: false
          reverseOrder: true
          excludeTypes: build
          token: ${{ steps.app-token.outputs.token }}
          fromTag: ${{ steps.version.outputs.version_git_tag }}
          toTag: ${{ steps.prev-tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.version_git_tag }}
          name: ${{ github.event.repository.name }}@${{ steps.version.outputs.version_tag }}
          body: ${{ steps.changelog.outputs.changes }}
