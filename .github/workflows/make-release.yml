name: Make Release (Auto-merge)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version - major.minor only (e.g., "25.10")'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: [ arc-frontend-runner-set ]
    steps:
      - name: Create GitHub App token
        uses: webitel/reusable-workflows/actions/create-github-app-token@create-github-app-token-v1
        id: app-token
        with:
          client-id: ${{ vars.DELIVERY_BOT_CLIENT_ID }}
          private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Get previous tag
        id: prev-tag
        uses: WyriHaximus/github-action-get-previous-tag@v1

      - name: Configure Git
        run: |
          git config user.name '${{ steps.app-token.outputs.user-name }}'
          git config user.email '${{ steps.app-token.outputs.user-email }}'

      - name: Set version variables
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          FULL_VERSION="${VERSION}.0"
          
          {
            echo "version=$VERSION"
            echo "full_version=$FULL_VERSION"
            echo "version_tag=v$VERSION"
            echo "version_git_tag=v${VERSION}-tagged"
          } >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: |
          git checkout -b "${{ steps.version.outputs.version_tag }}"

      - name: Update version in package.json
        run: npm version "${{ steps.version.outputs.full_version }}" --no-git-tag-version

      - name: Commit and push release branch
        run: |
          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          
          git commit -m "chore: bump version to ${{ steps.version.outputs.full_version }}"
          git push -u origin "${{ steps.version.outputs.version_tag }}"

      - name: Merge release branch to default branch
        run: |
          git checkout "${{ github.event.repository.default_branch }}"
          git merge "${{ steps.version.outputs.version_tag }}" --no-ff
          git push origin "${{ github.event.repository.default_branch }}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version_git_tag }}"
          git push origin "${{ steps.version.outputs.version_git_tag }}"

      - name: Generate release changelog
        id: changelog
        uses: requarks/changelog-action@v1
        continue-on-error: true
        with:
          writeToFile: false
          reverseOrder: true
          excludeTypes: build
          token: ${{ steps.app-token.outputs.token }}
          fromTag: ${{ steps.version.outputs.version_git_tag }}
          toTag: ${{ steps.prev-tag.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.version.outputs.version_git_tag }}
          name: ${{ github.event.repository.name }}@${{ steps.version.outputs.version_tag }}
          body: ${{ steps.changelog.outputs.changes }}
